# AI Image Chat - Pre-commit Configuration
#
# Pre-commit hooks run automatically before each commit to ensure code quality.
# These hooks enforce code formatting, linting, and basic file hygiene.
#
# Setup:
#   bash scripts/setup-dev.sh
#
# Manual run:
#   pre-commit run --all-files
#
# Skip hooks (when needed):
#   git commit --no-verify

repos:
  # ============================================================================
  # BLACK - Python Code Formatter
  # ============================================================================
  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black
        name: Format Python code with Black
        language_version: python3
        args: [--line-length=100]
        files: \.(py)$
        exclude: ^(\.git|\.venv|venv|env|ENV|build|dist|\.eggs|\.tox|__pycache__|\.mypy_cache|\.pytest_cache|\.ruff_cache|outputs|workflows|gradio_cached_examples|flagged)/

  # ============================================================================
  # RUFF - Fast Python Linter
  # ============================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.8
    hooks:
      - id: ruff
        name: Lint Python code with Ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: \.(py)$
        exclude: ^(\.git|\.venv|venv|env|ENV|build|dist|\.eggs|\.tox|__pycache__|\.mypy_cache|\.pytest_cache|\.ruff_cache|outputs|workflows|gradio_cached_examples|flagged)/

  # ============================================================================
  # GENERAL FILE CHECKS
  # ============================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      # Remove trailing whitespace
      - id: trailing-whitespace
        name: Remove trailing whitespace
        args: [--markdown-linebreak-ext=md]
        exclude: ^(\.git|\.venv|venv|env|ENV|outputs|workflows|gradio_cached_examples|flagged)/

      # Ensure files end with newline
      - id: end-of-file-fixer
        name: Fix end of files (add newline)
        exclude: ^(\.git|\.venv|venv|env|ENV|outputs|workflows|gradio_cached_examples|flagged)/

      # Check YAML syntax
      - id: check-yaml
        name: Check YAML syntax
        args: [--unsafe]
        exclude: ^(\.git|\.venv|venv|env|ENV|outputs|workflows|gradio_cached_examples|flagged)/

      # Check for added large files (>100MB)
      - id: check-added-large-files
        name: Check for large files (>100MB)
        args: ['--maxkb=102400']  # 100MB in KB

      # Check for merge conflict markers
      - id: check-merge-conflict
        name: Check for merge conflict markers

      # Check JSON syntax
      - id: check-json
        name: Check JSON syntax
        exclude: ^(\.git|\.venv|venv|env|ENV|outputs|workflows|gradio_cached_examples|flagged)/

      # Check for case conflicts in filenames
      - id: check-case-conflict
        name: Check for case conflicts in filenames

      # Check for mixed line endings
      - id: mixed-line-ending
        name: Fix mixed line endings
        args: ['--fix=lf']
        exclude: ^(\.git|\.venv|venv|env|ENV|outputs|workflows|gradio_cached_examples|flagged)/

      # Detect private keys
      - id: detect-private-key
        name: Detect private keys

# ============================================================================
# CONFIGURATION
# ============================================================================

# Run hooks in parallel for faster execution
default_install_hook_types: [pre-commit, pre-push]
default_stages: [commit]

# Fail fast - stop on first failure
fail_fast: false

# Files to exclude globally (in addition to per-hook excludes)
exclude: |
  (?x)^(
    \.git/|
    \.venv/|
    venv/|
    env/|
    ENV/|
    build/|
    dist/|
    \.eggs/|
    \.tox/|
    __pycache__/|
    \.mypy_cache/|
    \.pytest_cache/|
    \.ruff_cache/|
    outputs/|
    workflows/|
    gradio_cached_examples/|
    flagged/|
    .*\.pyc|
    .*\.pyo|
    .*\.egg-info/
  )
