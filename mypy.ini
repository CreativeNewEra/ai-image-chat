# AI Image Chat - Mypy Type Checking Configuration
#
# Mypy is a static type checker for Python that helps catch type errors
# before runtime. This configuration starts lenient and can be made stricter
# over time as type hints are added to the codebase.
#
# Run: mypy .
# Or: make type-check
#
# See docs/TYPING.md for more information on type hinting in this project.

[mypy]
# Python version to target
python_version = 3.10

# Import discovery
namespace_packages = True
explicit_package_bases = True

# Platform configuration
platform = linux

# Disallow dynamic typing (gradually enable these as codebase improves)
# disallow_any_unimported = False
# disallow_any_expr = False
# disallow_any_decorated = False
# disallow_any_explicit = False
# disallow_any_generics = False
# disallow_subclassing_any = False

# Untyped definitions and calls (lenient for now)
disallow_untyped_calls = False
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
disallow_untyped_decorators = False

# None and Optional handling
no_implicit_optional = True
strict_optional = True

# Warnings
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_return_any = True
warn_unreachable = True
warn_unused_configs = True

# Error messages
show_error_context = True
show_column_numbers = True
show_error_codes = True
pretty = True
color_output = True

# Miscellaneous strictness flags
strict_equality = True
strict_concatenate = True

# Configuring imports
ignore_missing_imports = True
follow_imports = normal

# Suppressing errors
# Allow untyped calls for now
allow_untyped_calls = True

# Incremental mode
incremental = True
cache_dir = .mypy_cache

# Files to exclude
exclude = (?x)(
    ^test_.*\.py$  # Test files
    | ^tests/  # Test directory
    | ^\.venv/  # Virtual environment
    | ^venv/  # Virtual environment
    | ^env/  # Virtual environment
    | ^ENV/  # Virtual environment
    | ^build/  # Build directory
    | ^dist/  # Distribution directory
    | ^\.eggs/  # Eggs directory
    | ^__pycache__/  # Cache
    | ^\.mypy_cache/  # Mypy cache
    | ^\.pytest_cache/  # Pytest cache
    | ^\.ruff_cache/  # Ruff cache
    | ^outputs/  # Generated images
    | ^workflows/  # Workflow files
    | ^gradio_cached_examples/  # Gradio cache
    | ^flagged/  # Gradio flagged
  )

# Per-module options for gradual typing

# Core modules - stricter checking for newly typed modules
[mypy-core.vram_estimator]
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy-core.seed_manager]
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy-core.prompt_history]
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy-utils.image_utils]
disallow_untyped_defs = True
disallow_incomplete_defs = True

# External libraries that don't have type stubs
[mypy-gradio.*]
ignore_missing_imports = True

[mypy-PIL.*]
ignore_missing_imports = True

[mypy-websocket.*]
ignore_missing_imports = True
